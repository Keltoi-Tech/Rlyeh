<!DOCTYPE html>
<html>
    <head>
        <base href="/">
        <meta charset="utf-8" />
        <title>Cthulhu!</title>
        <style>
            *{
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }

            body{
                margin: 0;
                padding: 0;
            }
        </style>
        <script type="module">
            import {
                kek,
                importStyle,
                cthulhu,
                define,
                trait,
                component,
                entry,
                Routing
            } from './index.js';

            const TestHeader=(content='')=>({
                css:importStyle('assets/header'),
                h2:{
                    content:content
                },
                hr:{},
                attributes:{
                    text:(root,value)=>{
                        root.h2.content=value;
                        root.h2.build();
                    }
                }
            })

            const List=(li=[])=>({
                ul:{
                    li:li.map(l=>{
                        console.log();
                        return {content:l}
                    })
                }
            });

            const AppMain=(s=undefined)=>({
                inlineSheet:'ul{background:rgb(255,233,12)}',
                testHeader:{
                    attributes:{
                        text:s?.header() ?? ''
                    },
                    events:{
                        click:()=>s?.sub('Click component test => OK')
                    }
                },
                list:trait(List,s?.list())
            })

            const service={
                sub:(a)=>console.log(a),
                list:()=>[
                    'Attribute test',
                    'Trait test',
                    'Component test',
                ],
                header:()=>'Tests - See your console to compare results'
            }

            define(TestHeader,'')
            define(AppMain,service)

            const main = component(AppMain);

            document.addEventListener('DOMContentLoaded',()=>{
                document.body.appendChild(main);

                console.log(main.root)

                console.log(`Attribute test => ${
                    main.root.testHeader.element.root.h2.content === 'Tests - See your console to compare results'
                        ?'OK':'NOK'
                }`);

                main.root.list.ul.li.map((li,i)=>li.content===service.list()[i]).forEach(
                    (ok,i)=>console.log(`Trait ${i} test => ${ok?'OK':'NOK'}`)
                )

                console.log(`Component test => ${
                    main.root.testHeader.element.nodeName === kek('testHeader').toUpperCase()
                        ?'OK':'NOK'
                }`)
            })
        </script>
    </head>
</html>
